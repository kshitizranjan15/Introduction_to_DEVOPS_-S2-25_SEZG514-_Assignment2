sonar.projectKey=ACEest
sonar.projectName=ACEest Fitness & Gym
sonar.sources=.
sonar.language=py
# If pytest-cov produces coverage.xml, point to it (CI step should generate this)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions (node_modules, virtualenvs, images, build files)
sonar.exclusions=**/images/**,**/.venv/**,**/venv/**,**/.git/**,**/build/**,**/dist/**
